# Cloud Build configuration to run Pulumi deployments on-the-fly
steps:
  # Install dependencies and run pulumi up using the official Pulumi Docker image
  - name: 'pulumi/pulumi:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        pulumi refresh --yes --stack $_STACK_NAME --non-interactive
        pulumi up --yes --stack $_STACK_NAME --non-interactive
    secretEnv:
      - 'PULUMI_ACCESS_TOKEN'

# Retrieve the Pulumi Access Token from GCP Secret Manager
availableSecrets:
  secretManager:
    - versionName: 'projects/$PROJECT_ID/secrets/$_PULUMI_ACCESS_TOKEN_ID/versions/latest'
      env: 'PULUMI_ACCESS_TOKEN'

options:
  # Log directly to Cloud Logging
  logging: CLOUD_LOGGING_ONLY
